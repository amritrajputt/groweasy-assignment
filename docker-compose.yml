version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - INNGEST_DEV=1
      - INNGEST_BASE_URL=http://inngest:8288
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    command: inngest dev --host 0.0.0.0 -u http://backend:4000/api/inngest
